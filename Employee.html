<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-image employee-page">
    <main style="display: flex; justify-content: center; width: 100%;">
        <div class="form-container">
            <h1><u>Employee Login</u></h1>
            <form>
                <input type="email" name="email" placeholder="Enter your email i'd">
                <input type="password" name="password" placeholder="Enter your password">
                <button class="btn" type="button" onclick="window.location.href='#Login'">Login</button>
                
                <div class="form-actions" style="margin-top: 1rem;">
                    <button class="btn" type="button" onclick="window.location.href='forget.html'">Forget password</button>
                    <button class="btn" type="button" onclick="window.location.href='E_Signup.html'">Signup</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
