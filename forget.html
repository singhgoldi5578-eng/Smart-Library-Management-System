<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Forget password Form </title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-image forget-page">
    <main style="display: flex; justify-content: center; width: 100%;">
        <div class="form-container">
            <h3><u>Enter Details</u></h3>
            <p><u>Forget password Form</u></p>
            <form>
                <input type="email" name="email" placeholder="Enter your registered email i'd" />
                <div class="form-actions">
                    <button class="btn">Submit</button> 
                    <button class="btn" type="button" onclick="window.history.back()">Cancel</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
